# V14.6: Multi-band STFT loss + sub-band discriminator
# 目标: 提升 4k-11kHz 高频重建质量, 突破 V14.4 的 11.36 dB 瓶颈
# 架构: V14.4 (无 skip, 无 LayerScale, sub-pixel decoder)
# 新增: 多频段加权 STFT loss + 高频子带判别器
# 启动: python -m autoencoder.train experiment=v14_6_full

version_tag: v14.6_full
run_name: wav_vae_${.version_tag}_${runtime.site_tag}_${runtime.role_tag}

train:
  output_dir: ${runtime.project_root}/outputs/models/${experiment.run_name}
  version_tag: ${experiment.version_tag}
  data_path: ${runtime.project_root}/data/ljspeech_concat_30s/manifest.json
  eval_data_path: ${runtime.data_path}

  # ─── Model (V14.4 architecture, unchanged) ────────────────
  latent_dim: 128
  strides: [2, 4, 4, 4, 4]
  encoder_channels: [128, 256, 512, 512, 1024, 1024]
  dilations: [1, 3, 9]

  # ─── Resume from V14.4 best ───────────────────────────────
  teacher_checkpoint: ${runtime.project_root}/outputs/models/wav_vae_v14.4_full_remote_main/best.pt

  # ─── Bottleneck ────────────────────────────────────────────
  reg_weight: 1.0e-2
  margin_mean: 3.0
  std_min: 0.1
  std_max: 1.5
  reg_warmup_steps: 0

  # ─── Loss weights (基础) ──────────────────────────────────
  l1_time_weight: 10.0
  l2_time_weight: 0.0
  stft_weight: 0.5
  mel_weight: 0.1

  # ─── Multi-band STFT loss (V14.6 新增) ────────────────────
  # 高频 band 给 2.5-3x 权重, 补偿时域模型高频弱势
  mb_stft_enable: true
  mb_stft_weight: 1.0
  mb_stft_fft_sizes: [1024, 2048]
  mb_stft_hop_sizes: [256, 512]
  mb_stft_win_sizes: [1024, 2048]
  mb_stft_band_edges: [0, 500, 1500, 3500, 6000, 11025]
  mb_stft_band_weights: [1.0, 1.0, 1.5, 2.5, 3.0]
  mb_stft_complex_weight: 0.5

  # ─── Training ─────────────────────────────────────────────
  batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  lr_warmup_steps: 200
  scheduler: cosine
  grad_clip: 1.0
  segment_length: 176128
  epochs: 50
  sr: 22050
  augment: true

  # ─── Adversarial (MS-STFT, 全频段) ────────────────────────
  adv_enable: true
  adv_start_epoch: 5
  disc_warmup_epochs: 3
  adv_d_lr: 4.0e-4
  adv_g_weight: 0.05
  adv_fm_weight: 2.0

  # ─── Sub-band discriminator (V14.6 新增, 高频专注) ─────────
  # 只关注 4k-11kHz, 给高频额外的对抗信号
  subband_disc_enable: true
  subband_disc_n_ffts: [1024, 2048]
  subband_disc_hop_lengths: [256, 512]
  subband_disc_win_lengths: [1024, 2048]
  subband_disc_freq_range: [4000, 11025]
  subband_disc_filters: 32
  subband_adv_g_weight: 0.1
  subband_adv_fm_weight: 2.0

  # ─── STFT loss (基础, 全频段) ──────────────────────────────
  stft_fft_sizes: [512, 1024, 2048]
  stft_hop_sizes: [128, 256, 512]
  stft_win_sizes: [512, 1024, 2048]

  # ─── Mel loss ─────────────────────────────────────────────
  mel_fft_sizes: [512, 1024, 2048]
  mel_n_mels: [64, 128, 256]

  # ─── Discriminator (MS-STFT, 全频段) ──────────────────────
  disc_n_ffts: [256, 512, 1024]
  disc_hop_lengths: [64, 128, 256]
  disc_win_lengths: [256, 512, 1024]
  disc_filters: 32

  # ─── Eval / logging ───────────────────────────────────────
  eval_every_epochs: 5
  eval_batches: 32
  log_interval: 50
  num_workers: 8
  prefetch_factor: 4
