# V16.1: high-fidelity time-domain baseline
#
# Goal:
#   Build a clean, fast-converging reconstruction baseline for latent
#   representation research. This intentionally relaxes compression from
#   512x to 128x so AE noise does not dominate downstream DiT experiments.
#
# Launch:
#   python -m autoencoder.train experiment=v16_1_hf_time runtime=remote

version_tag: v16.1_hf_time
run_name: wav_vae_${.version_tag}_${runtime.site_tag}_${runtime.role_tag}

train:
  output_dir: ${runtime.project_root}/outputs/models/${experiment.run_name}
  version_tag: ${experiment.version_tag}
  data_path: ${runtime.data_path}
  eval_data_path: ${runtime.eval_data_path}

  # ─── Model: 128x total stride, pure time-domain ───────────
  latent_dim: 256
  strides: [2, 4, 4, 4]
  encoder_channels: [128, 256, 512, 1024, 1024]
  dilations: [1, 3, 9]

  # ─── Deterministic bottleneck for HF reconstruction ───────
  sample_latent: false
  reg_weight: 1.0e-4
  margin_mean: 6.0
  std_min: 0.05
  std_max: 3.0
  reg_warmup_steps: 5000

  # ─── Simple reconstruction objective ─────────────────────
  l1_time_weight: 10.0
  l2_time_weight: 0.0
  stft_weight: 0.5
  mel_weight: 0.1

  # Keep disabled for the first baseline run. Add band losses only if
  # this low-compression baseline is stable but still audibly dirty.
  mb_stft_enable: false
  mb_stft_weight: 1.0
  mb_stft_fft_sizes: [512, 1024, 2048]
  mb_stft_hop_sizes: [128, 256, 512]
  mb_stft_win_sizes: [512, 1024, 2048]
  mb_stft_band_edges: [0, 500, 1500, 3500, 6000, 11025]
  mb_stft_band_weights: [1.0, 1.0, 1.5, 2.0, 2.5]
  mb_stft_complex_weight: 1.0

  # ─── Training ─────────────────────────────────────────────
  batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  lr_warmup_steps: 1000
  scheduler: cosine
  grad_clip: 1.0
  segment_length: 65536
  epochs: 50
  sr: 22050
  augment: false

  # ─── No adversarial / no phase patch ─────────────────────
  adv_enable: false
  adv_start_epoch: 999
  adv_d_lr: 0
  adv_g_weight: 0
  adv_fm_weight: 0
  freeze_encoder: false
  freeze_decoder_blocks: false

  # ─── STFT loss ────────────────────────────────────────────
  stft_fft_sizes: [512, 1024, 2048]
  stft_hop_sizes: [128, 256, 512]
  stft_win_sizes: [512, 1024, 2048]

  # ─── Mel loss ─────────────────────────────────────────────
  mel_fft_sizes: [512, 1024, 2048]
  mel_n_mels: [64, 128, 256]

  # ─── Discriminator placeholders (disabled) ────────────────
  disc_n_ffts: [256, 512, 1024]
  disc_hop_lengths: [64, 128, 256]
  disc_win_lengths: [256, 512, 1024]
  disc_filters: 32

  # ─── Eval / logging ───────────────────────────────────────
  eval_every_epochs: 2
  eval_batches: 32
  log_interval: 50
  num_workers: 8
  prefetch_factor: 4
