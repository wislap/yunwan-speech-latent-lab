# V16: dim=256 encoder + block[0] + Vocos Head
#
# 设计依据:
#   - V14.7g 证明 block[0]+Vocos 能学动 (7.23 dB, 上升中)
#   - V14.7e 证明 dim=256 encoder 能编码相位 R²=0.97
#   - 本版本: 两者结合, 从头端到端训练
#
# 架构:
#   Encoder: stride=[2,4,4,4,4]=512x, dim=256, channels=[128,256,512,512,1024,2048]
#   Decoder: proj(256→2048) → block[0](2048→1024, s=4, 43→172Hz) → Vocos(8层, 1024d) → iSTFT(512,128)
#   Latent: 256d @ 43Hz
#
# 启动:
#   python -m autoencoder.train experiment=v16_hybrid runtime=remote

version_tag: v16_hybrid
run_name: wav_vae_${.version_tag}_${runtime.site_tag}_${runtime.role_tag}

train:
  output_dir: ${runtime.output_root}/${experiment.run_name}
  version_tag: ${experiment.version_tag}
  data_path: ${runtime.data_path}
  eval_data_path: ${runtime.eval_data_path}

  # ─── Model: dim=256 encoder ───────────────────────────────
  latent_dim: 256
  strides: [2, 4, 4, 4, 4]
  encoder_channels: [128, 256, 512, 512, 1024, 2048]
  dilations: [1, 3, 9]

  # ─── Hybrid decoder: block[0] + Vocos ─────────────────────
  use_hybrid_decoder: true
  hybrid_vocos_hidden: 1024
  hybrid_vocos_layers: 8
  hybrid_n_fft: 512
  hybrid_hop: 128

  # ─── Bottleneck ────────────────────────────────────────────
  reg_weight: 1.0e-2
  margin_mean: 3.0
  std_min: 0.1
  std_max: 1.5
  reg_warmup_steps: 2000

  # ─── Loss ─────────────────────────────────────────────────
  l1_time_weight: 5.0
  l2_time_weight: 0.0
  stft_weight: 0.5
  mel_weight: 0.5

  mb_stft_enable: true
  mb_stft_weight: 2.0
  mb_stft_fft_sizes: [512, 1024, 2048]
  mb_stft_hop_sizes: [128, 256, 512]
  mb_stft_win_sizes: [512, 1024, 2048]
  mb_stft_band_edges: [0, 500, 1500, 3500, 6000, 11025]
  mb_stft_band_weights: [1.0, 1.0, 1.5, 2.0, 2.5]
  mb_stft_complex_weight: 1.0

  # ─── Training ─────────────────────────────────────────────
  batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  lr_warmup_steps: 2000
  scheduler: cosine
  grad_clip: 1.0
  segment_length: 176128
  epochs: 100
  sr: 22050
  augment: true

  # ─── No adversarial (Phase 1) ─────────────────────────────
  adv_enable: false
  adv_start_epoch: 999
  adv_d_lr: 0
  adv_g_weight: 0
  adv_fm_weight: 0

  # ─── STFT loss ────────────────────────────────────────────
  stft_fft_sizes: [512, 1024, 2048]
  stft_hop_sizes: [128, 256, 512]
  stft_win_sizes: [512, 1024, 2048]

  # ─── Mel loss ─────────────────────────────────────────────
  mel_fft_sizes: [512, 1024, 2048]
  mel_n_mels: [64, 128, 256]

  # ─── Eval / logging ───────────────────────────────────────
  eval_every_epochs: 5
  eval_batches: 32
  log_interval: 50
  num_workers: 8
  prefetch_factor: 4

  # ─── 端到端训练, 不冻结 ───────────────────────────────────
  freeze_encoder: false
  freeze_decoder_blocks: false
