# V16A: shallow time-domain baseline
#
# Purpose:
#   A decisive test for the current direction:
#   keep the time-domain autoencoder, increase latent capacity to 256,
#   and reduce the number of compression stages so phase-sensitive detail
#   passes through fewer nonlinear/resampling blocks.
#
# This is intentionally not a Vocos/iSTFT/dual-path experiment. Frequency
# losses remain diagnostics/training pressure; generation stays time-domain.
#
# Launch:
#   python -m autoencoder.train experiment=v16a_shallow_time runtime=remote

version_tag: v16a_shallow_time
run_name: wav_vae_${.version_tag}_${runtime.site_tag}_${runtime.role_tag}

train:
  output_dir: ${runtime.project_root}/outputs/models/${experiment.run_name}
  version_tag: ${experiment.version_tag}
  data_path: ${runtime.data_path}
  eval_data_path: ${runtime.eval_data_path}

  # ─── Model: 512x total stride, but only 3 stages ──────────
  latent_dim: 256
  strides: [8, 8, 8]
  encoder_channels: [128, 512, 1024, 2048]
  dilations: [1, 3, 9]

  # ─── Bottleneck ───────────────────────────────────────────
  reg_weight: 1.0e-2
  margin_mean: 3.0
  std_min: 0.1
  std_max: 1.5
  reg_warmup_steps: 2000

  # ─── Simple reconstruction objective ─────────────────────
  l1_time_weight: 10.0
  l2_time_weight: 0.0
  stft_weight: 0.5
  mel_weight: 0.1

  # Keep disabled for the first judgment run; enable only after the
  # shallow time-domain path has proved it can optimize cleanly.
  mb_stft_enable: false
  mb_stft_weight: 1.0
  mb_stft_fft_sizes: [512, 1024, 2048]
  mb_stft_hop_sizes: [128, 256, 512]
  mb_stft_win_sizes: [512, 1024, 2048]
  mb_stft_band_edges: [0, 500, 1500, 3500, 6000, 11025]
  mb_stft_band_weights: [1.0, 1.0, 1.5, 2.0, 2.5]
  mb_stft_complex_weight: 1.0

  # ─── Training ─────────────────────────────────────────────
  batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  lr_warmup_steps: 2000
  scheduler: cosine
  grad_clip: 1.0
  segment_length: 176128
  epochs: 80
  sr: 22050
  augment: true

  # ─── No adversarial / no phase patch ─────────────────────
  adv_enable: false
  adv_start_epoch: 999
  adv_d_lr: 0
  adv_g_weight: 0
  adv_fm_weight: 0
  freeze_encoder: false
  freeze_decoder_blocks: false

  # ─── STFT loss ────────────────────────────────────────────
  stft_fft_sizes: [512, 1024, 2048]
  stft_hop_sizes: [128, 256, 512]
  stft_win_sizes: [512, 1024, 2048]

  # ─── Mel loss ─────────────────────────────────────────────
  mel_fft_sizes: [512, 1024, 2048]
  mel_n_mels: [64, 128, 256]

  # ─── Discriminator placeholders (disabled) ────────────────
  disc_n_ffts: [256, 512, 1024]
  disc_hop_lengths: [64, 128, 256]
  disc_win_lengths: [256, 512, 1024]
  disc_filters: 32

  # ─── Eval / logging ───────────────────────────────────────
  eval_every_epochs: 5
  eval_batches: 32
  log_interval: 50
  num_workers: 8
  prefetch_factor: 4
