# V17.3: structure-aware frozen Conformer teacher distillation.
#
# Compared with the pointwise teacher smoke, this keeps the mature V16.3 AE
# as the reconstruction guardrail, but asks the shallow latent adapter to
# match the frozen teacher's batch-level relation graph and same-text
# cross-speaker positives.

version_tag: v17.3_v16.3_4spk_teacher_relational_rank_smoke
run_name: wav_vae_${.version_tag}_${runtime.site_tag}_${runtime.role_tag}

train:
  output_dir: ${runtime.project_root}/outputs/models/${experiment.run_name}
  version_tag: v17.3_v16.3_4spk_teacher_relational_rank_smoke
  data_path: ${runtime.project_root}/CosyVoice_main/outputs/tts/cosyvoice3/crossed_zh_4spk_4h_scale_v0_4spk_qc_8p0_13p5_train_phalign_neighbors.jsonl
  eval_data_path: ${runtime.project_root}/CosyVoice_main/outputs/tts/cosyvoice3/crossed_zh_4spk_4h_scale_v0_4spk_qc_8p0_13p5_val_phalign_neighbors.jsonl
  teacher_checkpoint: ${runtime.project_root}/outputs/models/wav_vae_v16.3_256x_dim384_time_remote_main/best.pt

  latent_dim: 384
  strides: [2, 4, 4, 8]
  encoder_channels: [128, 256, 512, 1024, 1024]
  dilations: [1, 3, 9]

  sample_latent: false
  reg_weight: 1.0e-4
  margin_mean: 6.0
  std_min: 0.05
  std_max: 3.0
  reg_warmup_steps: 5000

  l1_time_weight: 10.0
  l2_time_weight: 0.0
  stft_weight: 0.5
  mel_weight: 0.1
  mb_stft_enable: false
  mb_stft_weight: 1.0

  v17_constraints_enable: true
  v17_ext_weight: 0.0
  v17_semantic_weight: 0.0
  v17_cross_factor_weight: 0.0
  v17_flow_weight: 0.0
  v17_teacher_distill_weight: 0.03
  v17_teacher_checkpoint: ${runtime.project_root}/outputs/models/v17_3_conformer_teacher_4spk_qc_1000/best.pt
  v17_teacher_hidden_dim: 256
  v17_teacher_emb_dim: 192
  v17_teacher_adapter_hidden_dim: 384
  v17_teacher_adapter_depth: 2
  v17_teacher_layers: 6
  v17_teacher_heads: 4
  v17_teacher_ffn_dim: 1024
  v17_teacher_sr: 22050
  v17_teacher_n_fft: 1024
  v17_teacher_hop_length: 256
  v17_teacher_n_mels: 80
  v17_teacher_conv_kernel: 31
  v17_teacher_dropout: 0.0
  v17_teacher_detach_latent: false
  v17_teacher_relational_weight: 0.25
  v17_teacher_nce_weight: 0.15
  v17_teacher_nce_temperature: 0.12
  v17_teacher_positive_key: same_text_group
  v17_teacher_queue_size: 256
  v17_teacher_rank_guard_weight: 0.25
  v17_teacher_rank_guard_min_std: 0.03
  v17_teacher_rank_guard_max_top1: 0.55

  # Kept defined for checkpoint compatibility, but disabled above.
  v17_adapter_hidden_dim: 256
  v17_text_buckets: 512
  v17_speaker_buckets: 64
  v17_style_buckets: 32
  v17_ext_text_weight: 0.0
  v17_ext_speaker_weight: 0.0
  v17_ext_style_weight: 0.0
  v17_ext_speed_weight: 0.0
  v17_semantic_hidden_dim: 384
  v17_semantic_proj_dim: 192
  v17_semantic_depth: 4
  v17_semantic_infonce_weight: 1.0
  v17_semantic_js_weight: 0.05
  v17_semantic_temperature: 0.12
  v17_semantic_queue_size: 256
  v17_semantic_positive_key: same_text_group
  v17_semantic_detach_adapter_latent: false
  v17_cross_factor_hidden_dim: 384
  v17_cross_factor_phoneme_dim: 192
  v17_cross_factor_speaker_dim: 64
  v17_cross_factor_queue_size: 256
  v17_cross_factor_positive_key: same_text_group
  v17_cross_factor_phoneme_weight: 0.5
  v17_cross_factor_phoneme_nce_weight: 0.2
  v17_cross_factor_phoneme_temperature: 0.12
  v17_cross_factor_phoneme_uniform_weight: 0.05
  v17_cross_factor_phoneme_soft_weight: 1.0
  v17_cross_factor_phoneme_soft_hard_weight: 2.0
  v17_cross_factor_phoneme_soft_text_buckets: 512
  v17_cross_factor_speaker_weight: 0.75
  v17_cross_factor_speaker_same_weight: 0.35
  v17_cross_factor_speaker_target_cos: -1.0
  v17_cross_factor_detach_latent: false
  v17_flow_hidden_dim: 256
  v17_flow_depth: 2
  v17_external_detach_latent: false
  v17_flow_detach_target: true
  v17_flow_min_t: 0.0
  v17_flow_max_t: 1.0

  paired_text_sampler: true
  paired_text_key: same_text_group
  paired_text_shuffle: true
  v17_pcgrad_enable: false

  batch_size: 1
  grad_accum_steps: 4
  lr: 3.0e-5
  lr_warmup_steps: 10
  scheduler: cosine
  grad_clip: 1.0
  segment_length: 220500
  epochs: 1
  sr: 22050
  augment: false

  adv_enable: false
  adv_start_epoch: 999
  adv_d_lr: 0
  adv_g_weight: 0
  adv_fm_weight: 0
  freeze_encoder: false
  freeze_decoder_blocks: false

  stft_fft_sizes: [512, 1024, 2048]
  stft_hop_sizes: [128, 256, 512]
  stft_win_sizes: [512, 1024, 2048]

  mel_fft_sizes: [512, 1024, 2048]
  mel_n_mels: [64, 128, 256]

  disc_n_ffts: [256, 512, 1024]
  disc_hop_lengths: [64, 128, 256]
  disc_win_lengths: [256, 512, 1024]
  disc_filters: 32

  eval_every_epochs: 1
  eval_batches: 1
  log_interval: 4
  num_workers: 0
  prefetch_factor: 2
