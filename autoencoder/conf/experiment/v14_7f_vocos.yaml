# V14.7f: Vocos-style iSTFT decoder + dim=256 encoder
# Decoder 全程 43Hz (不上采样), ConvNeXt backbone, iSTFT 合成
# 每个频率 bin 有独立参数路径, 直接预测 magnitude + phase
# Encoder 从 V14.7e 加载 (dim=256, 已学会编码相位 R²=0.97)
# Decoder 从零训练
# 启动: python -m autoencoder.train experiment=v14_7f_vocos

version_tag: v14.7f_vocos
run_name: wav_vae_${.version_tag}_${runtime.site_tag}_${runtime.role_tag}

train:
  output_dir: ${runtime.project_root}/outputs/models/${experiment.run_name}
  version_tag: ${experiment.version_tag}
  data_path: ${runtime.project_root}/data/ljspeech_concat_30s/manifest.json
  eval_data_path: ${runtime.data_path}

  # ─── Model ────────────────────────────────────────────────
  latent_dim: 256
  strides: [2, 4, 4, 4, 4]
  encoder_channels: [128, 256, 512, 512, 1024, 2048]
  dilations: [1, 3, 9]

  # ─── Vocos decoder ────────────────────────────────────────
  use_vocos_decoder: true
  vocos_hidden_dim: 1024
  vocos_n_layers: 8
  vocos_n_fft: 1024
  vocos_hop: 512

  # ─── Load encoder from V14.7e ─────────────────────────────
  teacher_checkpoint: ${runtime.project_root}/outputs/models/wav_vae_v14.7e_full_remote_main/best.pt
  freeze_encoder: false

  # ─── Bottleneck ────────────────────────────────────────────
  reg_weight: 1.0e-2
  margin_mean: 3.0
  std_min: 0.1
  std_max: 1.5
  reg_warmup_steps: 0

  # ─── Loss: complex STFT 主导 ──────────────────────────────
  l1_time_weight: 5.0
  l2_time_weight: 0.0
  stft_weight: 0.5
  mel_weight: 0.5

  mb_stft_enable: true
  mb_stft_weight: 2.0
  mb_stft_fft_sizes: [512, 1024, 2048]
  mb_stft_hop_sizes: [128, 256, 512]
  mb_stft_win_sizes: [512, 1024, 2048]
  mb_stft_band_edges: [0, 500, 1500, 3500, 6000, 11025]
  mb_stft_band_weights: [1.0, 1.0, 1.5, 2.0, 2.5]
  mb_stft_complex_weight: 1.0

  # ─── Training ─────────────────────────────────────────────
  batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  lr_warmup_steps: 1000
  scheduler: cosine
  grad_clip: 1.0
  segment_length: 176128
  epochs: 50
  sr: 22050
  augment: true

  # ─── No adversarial ───────────────────────────────────────
  adv_enable: false
  adv_start_epoch: 999
  adv_d_lr: 0
  adv_g_weight: 0
  adv_fm_weight: 0

  # ─── STFT loss ────────────────────────────────────────────
  stft_fft_sizes: [512, 1024, 2048]
  stft_hop_sizes: [128, 256, 512]
  stft_win_sizes: [512, 1024, 2048]

  # ─── Mel loss ─────────────────────────────────────────────
  mel_fft_sizes: [512, 1024, 2048]
  mel_n_mels: [64, 128, 256]

  # ─── Eval / logging ───────────────────────────────────────
  eval_every_epochs: 5
  eval_batches: 32
  log_interval: 50
  num_workers: 8
  prefetch_factor: 4
